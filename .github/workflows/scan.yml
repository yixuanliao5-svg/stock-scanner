name: daily-scan

on:
  schedule:
    # 台北 14:10（台股收盤後，TWSE 資料約 14:00 更新完）
    - cron: '10 6 * * 1-5'
    # 台北 05:10（美股收盤後）
    - cron: '10 21 * * 0-4'
  workflow_dispatch: {}   # 手動觸發按鈕

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python scanner.py
      - name: commit & push
        run: |
          git config user.name  "alpha-hunter-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json history/
          git commit -m "scan $(TZ=Asia/Taipei date '+%F %H:%M')" || echo "no changes"
          git push
